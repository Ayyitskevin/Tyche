<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Confirm your email — Tyche</title>
  <meta name="robots" content="noindex" />
  <style>
    :root { --bg:#09090b; --panel:#18181b; --line:#27272a; --text:#e4e4e7; --dim:#a1a1aa; --sky:#38bdf8; --green:#34d399; --red:#f87171; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font:15px/1.6 -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; display:flex; min-height:100vh; align-items:center; justify-content:center; padding:20px; }
    .card { width:100%; max-width:400px; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:28px 26px; text-align:center; }
    h1 { font-size:20px; letter-spacing:-0.01em; margin:0 0 12px; }
    .msg { font-size:14px; color:var(--dim); min-height:20px; }
    .msg.err { color:var(--red); }
    .msg.ok { color:var(--green); }
    a { color:var(--sky); }
    footer { margin-top:18px; font-size:12px; color:#71717a; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Confirming your email…</h1>
    <div id="msg" class="msg" role="status">One moment.</div>
    <footer><a href="/">← Back to Tyche</a></footer>
  </div>
  <script>
    (function () {
      var msg = document.getElementById('msg');
      function show(text, kind) { msg.textContent = text; msg.className = 'msg ' + (kind || ''); }
      var token = new URLSearchParams(window.location.search).get('token') || '';
      if (!token) {
        show('This link is missing its token. Use the RESEND option in your account to get a fresh one.', 'err');
        return;
      }
      fetch('/api/auth/verify', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ token: token }),
      })
        .then(function (res) { return res.json().then(function (body) { return { ok: res.ok, body: body }; }); })
        .then(function (r) {
          if (r.ok) {
            show('Email confirmed — you’re all set. Taking you to the terminal…', 'ok');
            setTimeout(function () { window.location.href = '/'; }, 1200);
          } else {
            var m = (r.body && r.body.error && r.body.error.message) || 'Could not confirm your email.';
            show(m, 'err');
          }
        })
        .catch(function () { show('Network error — please try again.', 'err'); });
    })();
  </script>
</body>
</html>
