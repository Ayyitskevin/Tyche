<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Accept your Tyche invite</title>
  <meta name="robots" content="noindex" />
  <style>
    :root { --bg:#09090b; --panel:#18181b; --line:#27272a; --text:#e4e4e7; --dim:#a1a1aa; --sky:#38bdf8; --green:#34d399; --red:#f87171; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font:15px/1.6 -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; display:flex; min-height:100vh; align-items:center; justify-content:center; padding:20px; }
    .card { width:100%; max-width:400px; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:28px 26px; }
    h1 { font-size:20px; letter-spacing:-0.01em; margin:0 0 4px; }
    p.sub { color:var(--dim); font-size:13.5px; margin:0 0 20px; }
    label { display:block; font-size:12.5px; color:var(--dim); margin:0 0 6px; }
    input { width:100%; background:var(--bg); border:1px solid var(--line); border-radius:8px; color:var(--text); padding:10px 12px; font:inherit; }
    input:focus { outline:none; border-color:var(--sky); }
    button { width:100%; margin-top:16px; background:var(--sky); color:#06131c; border:0; border-radius:8px; padding:11px; font:600 15px inherit; cursor:pointer; }
    button:disabled { opacity:.55; cursor:default; }
    .msg { margin-top:14px; font-size:13.5px; min-height:18px; }
    .msg.err { color:var(--red); }
    .msg.ok { color:var(--green); }
    a { color:var(--sky); }
    footer { margin-top:18px; font-size:12px; color:#71717a; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Accept your invite</h1>
    <p class="sub">You've been invited to a Tyche workspace. Set a password to create your account.</p>
    <form id="form" autocomplete="off">
      <label for="pw">Password (at least 8 characters)</label>
      <input id="pw" type="password" minlength="8" autocomplete="new-password" required />
      <label for="pw2" style="margin-top:14px;">Confirm password</label>
      <input id="pw2" type="password" minlength="8" autocomplete="new-password" required />
      <button id="submit" type="submit">Create account</button>
      <div id="msg" class="msg" role="status"></div>
    </form>
    <footer><a href="/">← Back to Tyche</a></footer>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token') || '';
      var form = document.getElementById('form');
      var msg = document.getElementById('msg');
      var btn = document.getElementById('submit');
      function show(text, kind) { msg.textContent = text; msg.className = 'msg ' + (kind || ''); }
      if (!token) {
        show('This invite link is missing its token. Ask your admin to resend it.', 'err');
        btn.disabled = true;
        return;
      }
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var pw = document.getElementById('pw').value;
        var pw2 = document.getElementById('pw2').value;
        if (pw.length < 8) { show('Password must be at least 8 characters.', 'err'); return; }
        if (pw !== pw2) { show('Passwords do not match.', 'err'); return; }
        btn.disabled = true;
        show('Creating your account…', '');
        fetch('/api/auth/invite/accept', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ token: token, password: pw }),
        })
          .then(function (res) { return res.json().then(function (body) { return { ok: res.ok, body: body }; }); })
          .then(function (r) {
            if (r.ok) {
              show('Account created. Signing you in…', 'ok');
              setTimeout(function () { window.location.href = '/'; }, 900);
            } else {
              var m = (r.body && r.body.error && r.body.error.message) || 'Could not accept the invite.';
              show(m, 'err');
              btn.disabled = false;
            }
          })
          .catch(function () { show('Network error — please try again.', 'err'); btn.disabled = false; });
      });
    })();
  </script>
</body>
</html>
