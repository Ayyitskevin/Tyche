name: CI

on:
  push:
    branches: [main]
  pull_request:

# Verifies the monorepo: strict typecheck, unit/contract/API tests, and the web
# production build. The Playwright e2e suite is intentionally NOT run here — it
# needs a provisioned browser (see playwright.config.ts, which uses an
# environment-provided Chromium) and is run locally via `pnpm test:e2e`.
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
